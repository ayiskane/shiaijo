<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <!-- Crossed Shinai -->
  <g transform="translate(70, 80)" opacity="0.9">
    <g transform="rotate(-25, 50, 150)">
      <rect x="45" y="250" width="10" height="50" rx="2" fill="#4a3728"/>
      <rect x="44" y="248" width="12" height="8" rx="1" fill="#2d1f14"/>
      <path d="M50 248 L50 50" stroke="#8B7355" stroke-width="8" fill="none" stroke-linecap="round"/>
      <rect x="47" y="40" width="6" height="15" rx="3" fill="#2d1f14"/>
    </g>
    <g transform="rotate(25, 50, 150)">
      <rect x="45" y="250" width="10" height="50" rx="2" fill="#4a3728"/>
      <rect x="44" y="248" width="12" height="8" rx="1" fill="#2d1f14"/>
      <path d="M50 248 L50 50" stroke="#8B7355" stroke-width="8" fill="none" stroke-linecap="round"/>
      <rect x="47" y="40" width="6" height="15" rx="3" fill="#2d1f14"/>
    </g>
  </g>
  
  <!-- Red Hanko Seal -->
  <g transform="translate(85, 60)">
    <rect width="32" height="40" rx="2" fill="#c41e3a"/>
    <text x="16" y="16" font-family="serif" font-size="10" fill="#f5e6d3" text-anchor="middle" font-weight="bold">剣</text>
    <text x="16" y="32" font-family="serif" font-size="10" fill="#f5e6d3" text-anchor="middle" font-weight="bold">道</text>
  </g>
  
  <!-- Main Text -->
  <text x="200" y="110" font-family="serif" font-size="72" fill="#f5f0e6" text-anchor="middle">試</text>
  <text x="200" y="195" font-family="serif" font-size="72" fill="#f5f0e6" text-anchor="middle">合</text>
  <text x="200" y="280" font-family="serif" font-size="72" fill="#f5f0e6" text-anchor="middle">場</text>
  
  <!-- Side text -->
  <text x="270" y="130" font-family="serif" font-size="18" fill="#f5f0e6" opacity="0.85">剣</text>
  <text x="270" y="154" font-family="serif" font-size="18" fill="#f5f0e6" opacity="0.85">道</text>
  <text x="270" y="178" font-family="serif" font-size="18" fill="#f5f0e6" opacity="0.85">競</text>
  <text x="270" y="202" font-family="serif" font-size="18" fill="#f5f0e6" opacity="0.85">技</text>
  
  <!-- English -->
  <text x="200" y="340" font-family="Georgia, serif" font-size="28" fill="#f5f0e6" text-anchor="middle" letter-spacing="4">Shiaijo</text>
  <text x="200" y="365" font-family="Georgia, serif" font-size="11" fill="#f5f0e6" text-anchor="middle" opacity="0.6">Competition Arena</text>
</svg>
